<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Analytics...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #080510;
            color: #fff8e7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        a {
            color: #d4a843;
            text-decoration: underline;
        }
    </style>
    <script>
        (function () {
            const cleanHost = window.location.hostname || 'localhost';
            // Strip view.html, index.html, and trailing slashes to keep the tracker key consistent
            const cleanPath = window.location.pathname
                .replace(/\/view\.html$/, '')
                .replace(/\/index\.html$/, '')
                .replace(/\/$/, '') || '';

            const trackerKey = (cleanHost + cleanPath).replace(/[^a-zA-Z0-9.-]/g, '_');
            const dashboardUrl = `https://hits.sh/chaturmas-pravesh-${trackerKey}/`;

            // Perform redirect immediately
            window.location.replace(dashboardUrl);
        })();
    </script>
</head>

<body>
    <div>
        <p>Redirecting to hits.sh analytics dashboard...</p>
        <p><a id="fallback-link" href="#">Click here if you are not redirected automatically</a></p>
    </div>
    <script>
        (function () {
            const cleanHost = window.location.hostname || 'localhost';
            const cleanPath = window.location.pathname
                .replace(/\/view\.html$/, '')
                .replace(/\/index\.html$/, '')
                .replace(/\/$/, '') || '';
            const trackerKey = (cleanHost + cleanPath).replace(/[^a-zA-Z0-9.-]/g, '_');
            document.getElementById('fallback-link').href = `https://hits.sh/chaturmas-pravesh-${trackerKey}/`;
        })();
    </script>
</body>

</html>
